<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seriph Fonts CDN</title>
    <style>
      body { font: 16px/1.6 ui-sans-serif, system-ui, sans-serif; max-width: 40rem; margin: 12vh auto; padding: 0 1.25rem; color: #0b0b0b; }
      code { background: #f2f2f2; padding: 0.1em 0.35em; border-radius: 4px; }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <h1>Seriph Fonts</h1>
    <p>This host serves the Seriph font CDN.</p>
    <ul>
      <li><code>/css2?family=Family:wght@400..700</code> — Google-Fonts-style CSS API</li>
      <li><code>/s/&lt;slug&gt;/&lt;v&gt;/&lt;file&gt;.woff2</code> — web font assets</li>
      <li><code>/d/&lt;slug&gt;/&lt;v&gt;/&lt;file&gt;</code> — original downloads</li>
    </ul>
  </body>
</html>
